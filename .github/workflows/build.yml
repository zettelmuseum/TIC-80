name: Build

on: [push, pull_request]

env:
  BUILD_TYPE: MinSizeRel

jobs:
  
  # === Android ===
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e
          add-to-path: false
          local-cache: true

      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Build
        run: |
          cd build/android
          chmod +x gradlew
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release.apk tic80.apk

        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Deploy
        uses: actions/upload-artifact@v3
        with:
          name: "tic80-android"
          path: build/android/tic80.apk

  # === HTML ===


  # === Export stub ===
  export-stub:
    needs: [export]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        script: [lua, moon, fennel, ruby, js, wren, squirrel, wasm, scheme, janet, python]

    steps:
      - name: Download Windows XP artifact
        uses: actions/download-artifact@v3
        with:
          name: tic80-winxp-stub
          path: winxpdir

      - name: Download Windows artifact
        uses: actions/download-artifact@v3
        with:
          name: tic80-windows-stub
          path: windir

      - name: Download Ubuntu artifact
        uses: actions/download-artifact@v3
        with:
          name: tic80-linux-stub
          path: linuxdir

      - name: Download RPI artifact
        uses: actions/download-artifact@v3
        with:
          name: tic80-rpi-stub
          path: rpidir

      - name: Download MacOS artifact
        uses: actions/download-artifact@v3
        with:
          name: tic80-macos-stub
          path: macdir

      - name: Download HTML artifact
        uses: actions/download-artifact@v3
        with:
          name: tic80-html-stub

      - name: Rename
        run: |
          cp winxpdir/tic80${{ matrix.script }}.exe winxp${{ matrix.script }}
          cp windir/tic80${{ matrix.script }}.exe win${{ matrix.script }}
          cp linuxdir/tic80${{ matrix.script }} linux${{ matrix.script }}
          cp rpidir/tic80${{ matrix.script }} rpi${{ matrix.script }}
          cp macdir/tic80${{ matrix.script }} mac${{ matrix.script }}
          mv -f tic80${{ matrix.script }}.js tic80.js
          zip html${{ matrix.script }}.zip index.html tic80.js tic80${{ matrix.script }}.wasm
          mv -f html${{ matrix.script }}.zip html${{ matrix.script }}

      - name: Deploy
        uses: actions/upload-artifact@v3
        with:
          name: "tic80-export"
          path: |
            winxp${{ matrix.script }}
            win${{ matrix.script }}
            linux${{ matrix.script }}
            rpi${{ matrix.script }}
            mac${{ matrix.script }}
            html${{ matrix.script }}

  # === Delete stub artifacts ===
  delete-stub:
    needs: [export-stub]
    runs-on: ubuntu-latest

    steps:
      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v2
        with:
          name: |
            tic80-winxp-stub
            tic80-windows-stub
            tic80-linux-stub
            tic80-rpi-stub
            tic80-macos-stub
            tic80-html-stub

  # === Delete PRO artifacts ===
  delete-pro:
    needs: [winxp-pro, windows-pro, linux-pro, macos-pro, rpi-pro]
    runs-on: ubuntu-latest

    steps:
      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v2
        with:
          name: |
            tic80-macos-pro
            tic80-macos-dmg-pro
            tic80-winxp-pro
            tic80-windows-pro
            tic80-linux-deb-pro
            tic80-linux-pro
            tic80-rpi-deb-pro
            tic80-rpi-pro
